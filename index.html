<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Comunidade do Jota - Jogos do Dia</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:ital,wght@0,900;1,900&display=swap');
        :root { --primary: #00ff88; --bg: #020202; }
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg);
            color: #fff;
            overflow-x: hidden;
            font-family: Arial, sans-serif;
            background: url('https://raw.githubusercontent.com/JCPrime01/jp-api-hnc/main/jp-direto.jpg') center/cover no-repeat fixed;
        }

        .bg-lines {
            position: fixed;
            inset: 0;
            z-index: 1;
            background-image: linear-gradient(to right, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 10% 100%;
            pointer-events: none;
        }

        .bg-lines::after {
            content: "";
            position: absolute;
            top: -100%; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, transparent, rgba(0,255,136,0.1), transparent);
            animation: moveLines 6s linear infinite;
        }

        @keyframes moveLines {
            0% { transform: translateY(0%); }
            100% { transform: translateY(200%); }
        }

        .main-content {
            position: relative;
            z-index: 10;
            width: 100%;
            padding-bottom: 220px;
            text-align: center;
        }

        .section-label {
            font-size: 12px;
            text-transform: uppercase;
            color: var(--primary);
            letter-spacing: 4px;
            padding-top: 40px;
            margin-bottom: 15px;
            font-weight: bold;
        }

        .carousel-container { display: flex; width: 100%; overflow: hidden; padding: 10px 0; }
        .carousel-track { display: flex; gap: 20px; animation: scroll 25s linear infinite; padding-left: 20px; }

        @keyframes scroll {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        .game-card {
            background: rgba(255,255,255,0.03);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            min-width: 260px;
            padding: 20px;
            border-radius: 24px;
            border: 1px solid rgba(255,255,255,0.1);
            text-align: center;
        }

        .teams-row { display: flex; align-items: center; justify-content: space-around; gap: 10px; }
        .team img { width: 45px; height: 45px; object-fit: contain; }
        .vs { font-weight: 900; color: var(--primary); font-size: 18px; }

        .headline {
            font-family: 'Kanit', sans-serif;
            font-size: clamp(32px, 10vw, 48px);
            font-weight: 900;
            font-style: italic;
            text-transform: uppercase;
            margin: 40px 0;
            line-height: 1.1;
            padding: 0 20px;
            text-shadow: 0 4px 15px rgba(0,0,0,0.8);
        }

        /* FIXED FOOTER */
        .fixed-footer {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: rgba(2,2,2,0.95);
            padding: 12px 20px 0 20px;
        }

        .alert-box {
            width: 100%;
            max-width: 380px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 10px 15px;
            margin-bottom: 10px;
            backdrop-filter: blur(10px);
        }

        .alert-box p { font-size: 13px; color: #fff; line-height: 1.4; text-align: center; }

        .btn-container { width: 100%; max-width: 380px; margin-bottom: 10px; animation: pulse 2s infinite ease-in-out; }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.03); }
        }

        .btn-border-beam {
            position: relative; padding: 2px; border-radius: 18px; overflow: hidden; display: block; text-decoration: none;
            box-shadow: 0 0 20px rgba(0,136,204,0.5);
        }

        .btn-border-beam::before {
            content: ""; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: conic-gradient(transparent, transparent, #0088cc, transparent);
            animation: rotate 3s linear infinite;
        }

        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .btn-content {
            position: relative; background: #0088cc; color: #fff; padding: 18px; border-radius: 16px;
            font-size: 18px; font-weight: 900; text-transform: uppercase;
            display: flex; align-items: center; justify-content: center; z-index: 5;
        }

        .bateubet-footer {
            width: 100%;
            display: block;
            margin: 0;
        }
    </style>
</head>
<body>

    <div class="bg-lines"></div>

    <div class="main-content">
        <p class="section-label">Jogos do Dia</p>

        <div class="carousel-container">
            <div class="carousel-track">
                <div class="game-card">
                    <div class="teams-row">
                        <div class="team"><img src="https://raw.githubusercontent.com/JCPrime01/jp-api-hnc/main/Mirassol-SP HD.png" alt=""><span>Athletico</span></div>
                        <div class="vs">VS</div>
                        <div class="team"><img src="https://crests.football-data.org/1770.png" alt=""><span>Botafogo</span></div>
                    </div>
                </div>
                <div class="game-card">
                    <div class="teams-row">
                        <div class="team"><img src="https://raw.githubusercontent.com/JCPrime01/jp-api-hnc/main/Internacional.png" alt=""><span>Inter</span></div>
                        <div class="vs">VS</div>
                        <div class="team"><img src="https://crests.football-data.org/1776.png" alt=""><span>São Paulo</span></div>
                    </div>
                </div>
                <div class="game-card">
                    <div class="teams-row">
                        <div class="team"><img src="https://raw.githubusercontent.com/JCPrime01/jp-api-hnc/main/Mirassol-SP HD.png" alt=""><span>Athletico</span></div>
                        <div class="vs">VS</div>
                        <div class="team"><img src="https://crests.football-data.org/1770.png" alt=""><span>Botafogo</span></div>
                    </div>
                </div>
            </div>
        </div>

        <h1 class="headline">ANÁLISE<br><span style="color: var(--primary)">LIBERADA</span></h1>
    </div>

    <!-- FIXED FOOTER -->
    <div class="fixed-footer">
        <div class="alert-box">
            <p>Grupo gratuito no telegram</p>
        </div>
        <div class="btn-container">
            <a href="https://pe.hublab.uk/" class="btn-border-beam">
                <span class="btn-content"><svg width="22" height="22" viewBox="0 0 24 24" fill="white" style="vertical-align:middle;margin-right:8px"><path d="M12 0C5.373 0 0 5.373 0 12s5.373 12 12 12 12-5.373 12-12S18.627 0 12 0zm5.894 8.221l-1.97 9.28c-.145.658-.537.818-1.084.508l-3-2.21-1.447 1.394c-.16.16-.295.295-.605.295l.213-3.053 5.56-5.023c.242-.213-.054-.333-.373-.12L8.32 13.617l-2.96-.924c-.64-.204-.657-.64.136-.954l11.566-4.462c.537-.194 1.006.131.832.944z"/></svg> ENTRAR NO GRUPO</span>
            </a>
        </div>
        <img src="https://raw.githubusercontent.com/JCPrime01/jp-api-hnc/main/BATEUBET.png" class="bateubet-footer" alt="">
    </div>

</body>
</html>
