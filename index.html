<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comunidade do Jota</title>

    <script>
    !function(f,b,e,v,n,t,s)
    {if(f.fbq)return;n=f.fbq=function(){n.callMethod?
    n.callMethod.apply(n,arguments):n.queue.push(arguments)};
    if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
    n.queue=[];t=b.createElement(e);t.async=!0;
    t.src=v;s=b.getElementsByTagName(e)[0];
    s.parentNode.insertBefore(t,s)}(window, document,'script',
    'https://connect.facebook.net/en_US/fbevents.js');

    fbq('init', '1251810006927464');
    fbq('track', 'PageView');
    </script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        html, body {
            height: 100%;
            width: 100%;
            overflow: hidden;
        }

        body {
            background-color: #020d04;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 450px;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding-top: 15px;
        }

        .content-wrapper {
            width: 100%;
            padding: 0 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-around;
            flex: 1;
        }

        .header-box {
            border: 1px solid #4ade80;
            border-radius: 50px;
            padding: 12px 20px;
            width: 100%;
            background: linear-gradient(180deg, rgba(74, 222, 128, 0.1) 0%, rgba(0,0,0,0) 100%);
            text-align: center;
        }

        .header-box h2 { font-size: 1.4rem; font-weight: bold; }
        .header-box span { color: #4ade80; font-style: italic; }
        .header-box p { font-size: 0.85rem; margin-top: 2px; opacity: 0.9; }

        /* FOTO DO ZECA GRANDE */
        .image-wrapper {
            position: relative;
            width: 260px;
        }

        .image-wrapper img { width: 100%; display: block; z-index: 10; position: relative; }

        .image-wrapper::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 160px;
            height: 160px;
            background: #4ade80;
            filter: blur(80px);
            opacity: 0.4;
            z-index: 1;
        }

        .main-title {
            font-size: 1.25rem; 
            line-height: 1.2;
            font-weight: bold;
            text-align: center;
        }

        .highlight-green {
            color: #4ade80;
            font-weight: 800;
        }

        .alert-box {
            background-color: rgba(10, 30, 15, 0.8);
            border-radius: 12px;
            padding: 10px 15px;
            width: 100%;
            border: 1px solid rgba(74, 222, 128, 0.2);
            text-align: center;
        }

        .alert-box .warning-text {
            color: #4ade80;
            font-size: 0.9rem;
            font-weight: bold;
            display: block;
            margin-bottom: 2px;
        }

        .alert-box p {
            font-size: 0.8rem;
            color: #ccc;
        }

        .cta-button {
            background-color: #4ade80;
            color: #000 !important;
            text-decoration: none;
            width: 100%;
            padding: 16px;
            border-radius: 12px;
            font-weight: 800;
            font-size: 1.1rem;
            text-transform: uppercase;
            box-shadow: 0 4px 15px rgba(74, 222, 128, 0.3);
            display: inline-block;
            text-align: center;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(74, 222, 128, 0.7); }
            70% { transform: scale(1.03); box-shadow: 0 0 0 10px rgba(74, 222, 128, 0); }
            100% { transform: scale(1); }
        }

        /* SELO POR EXTENSO DE PONTA A PONTA */
        .stamp-bottom {
            width: 100%;
            display: block;
            height: auto;
            margin: 0;
        }
    </style>
</head>
<body>

    <div class="container">
        
        <div class="content-wrapper">
            <div class="header-box">
                <h2>Comunidade do <span>Jota</span></h2>
                <p>A maior <b>comunidade gratuita</b> de futebol!</p>
            </div>

            <div class="image-wrapper">
                <img src="foto-perfil-6.png" alt="Especialista">
            </div>

            <h1 class="main-title">
                Os melhores palpites do <span class="highlight-green">DIA</span><br>
                estão saindo agora na<br>
                <span class="highlight-green">MINHA COMUNIDADE</span>
            </h1>

            <div class="alert-box">
                <span class="warning-text">⚠️ ENTRE E AGUARDE ⚠️</span>
                <p>As entradas serão enviadas em instantes!</p>
            </div>

            <a href="https://mais.red/run/zecaorganico" class="cta-button" onclick="trackClick()">
                Participar da Comunidade
            </a>
        </div>

        <!-- SELO BATEUBET / MINISTÉRIO DA FAZENDA NO RODAPÉ -->
        <img src="ESPORTIVA.png" alt="Selo Bateubet" class="stamp-bottom">

    </div>

    <script>
    function trackClick() {
        fbq('track', 'Subscribe');
        console.log("Lead enviado!");
    }
    </script>

</body>
</html>
